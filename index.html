<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <title>Contact form</title>
</head>

<body>
    <div class="form-container">

        <div id="form-area">
            <p class="eyebrow">Get in touch</p>
            <h2>Contact us</h2>
            <p class="subheading">We'll get back to you within 24 hours.</p>

            <form class="form" novalidate>
                <div class="flex-group">
                    <div class="form-group">
                        <label for="first-name">First name <span>*</span></label>
                        <input type="text" id="first-name" placeholder="Ada" />
                        <p class="inline-error" id="first-name-error"></p>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last name <span>*</span></label>
                        <input type="text" id="last-name" placeholder="Lovelace" />
                        <p class="inline-error" id="last-name-error"></p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email-address">Email address <span>*</span></label>
                    <input type="text" id="email-address" placeholder="ada@example.com">
                    <p class="inline-error" id="email-error"></p>
                </div>

                <div class="form-group">
                    <label>Query type <span>*</span></label>
                    <div class="input-flex">
                        <label class="radio-card">
                            <input type="radio" name="query-type" value="general" />
                            <span class="radio-dot"></span>
                            General enquiry
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="query-type" value="support" />
                            <span class="radio-dot"></span>
                            Support request
                        </label>
                    </div>
                    <p class="inline-error" id="query-error"></p>
                </div>

                <div class="form-group">
                    <label for="message">Message <span>*</span></label>
                    <textarea id="message" placeholder="Tell us how we can help…"></textarea>
                    <p class="inline-error" id="message-error"></p>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="checkbox" />
                    <label for="checkbox">I consent to being contacted by the team <span>*</span></label>
                </div>
                <p class="inline-error" id="checkbox-error"></p>

                <button type="submit" class="btn-submit">Send message</button>
            </form>
        </div>

        <div class="success-state" id="success-state">
            <div class="success-icon">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M4 11.5L9 16.5L18 6" stroke="#4b8c6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h3>Message sent!</h3>
            <p>Thanks for reaching out. We'll be in touch soon.</p>
            <button class="btn-reset" id="btn-reset">Send another message</button>
        </div>

    </div>
</body>

</html>
