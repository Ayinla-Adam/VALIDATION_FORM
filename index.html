<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <title>Contact form</title>
</head>

<body>
    <div class="form-container">
        <h2>Contact us</h2>

        <form class="form">
            <div class="flex-group">
                <div class="form-group">
                    <label for="first-name">First name <span>*</span></label>
                    <input type="text" id="first-name" />
                    <p class="inline-error" id="first-name-error"></p>
                </div>

                <div class="form-group">
                    <label for="last-name">Last name <span>*</span></label>
                    <input type="text" id="last-name" />
                    <p class="inline-error" id="last-name-error"></p>
                </div>
            </div>

            <div class="form-group">
                <label for="email-address">Email address <span>*</span></label>
                <input type="text" id="email-address">
                <p class="inline-error" id="email-error"></p>
            </div>

            <div class="form-group">
                <label for="query-type">Query Type <span>*</span></label>
                <div class="input-flex">
                    <span><input type="radio" name="query-type" /><span>General Enquiry</span></span>
                    <span><input type="radio" name="query-type" /><span>Support Request</span></span>
                </div>
                <p class="inline-error" id="query-error"></p>
            </div>

            <div class="form-group">
                <label for="message">Message <span>*</span></label>
                <textarea rows="5" id="message"></textarea>
                <p class="inline-error" id="message-error"></p>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="checkbox" />
                <label for="checkbox">I consent to being contacted by the team <span>*</span></label>
            </div>
            <p class="inline-error" id="checkbox-error"></p>

            <button type="submit" class="btn-submit">LOG IN</button>
        </form>
    </div>
</body>

</html>
